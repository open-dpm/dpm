# Include-ready GitLab CI template for user manifest repositories
# Usage in your repo's .gitlab-ci.yml:
#
# include:
#   - remote: 'https://raw.githubusercontent.com/open-dpm/dpm/main/ci/gitlab/dpm-manifests.yml'
#
# variables:
#   DPM_MANIFESTS_PATH: "manifests"  # directory holding your manifests (default: repo root)
#   DPM_PKG: "dpm @ git+https://gitlab.example.com/data/dpm.git@v0.2.0"  # install source
#   DPM_IMAGE: "registry.gitlab.example.com/data/dpm:0.2.0"             # prebuilt image (faster)
#
# Two ways to get the tool, set once as group-level CI/CD variables:
#   - DPM_PKG   — install source, when the job installs DPM with pip (default).
#   - DPM_IMAGE — a prebuilt image that already has DPM; the install step is then skipped,
#                 so the pipeline runs without pip install on every commit. See docs/gitlab-setup.md.
#
# This template only validates manifests. Merge-request approvals (how many,
# and by whom) are intentionally left to your platform's own approval rules.

variables:
  DPM_PKG: "dpm @ git+https://github.com/open-dpm/dpm.git@main"
  DPM_IMAGE: "python:3.12-slim"

.dpm_base:
  image: "$DPM_IMAGE"
  before_script:
    # Skip installation if the image already ships DPM (e.g. DPM_IMAGE points at a prebuilt one).
    - command -v dpm >/dev/null 2>&1 || pip install --quiet "${DPM_PKG}"

dpm:validate:
  extends: .dpm_base
  stage: validate
  script:
    - dpm validate --all --base-path "${DPM_MANIFESTS_PATH:-.}"
  rules:
    - changes:
        - "**/manifest.yaml"
